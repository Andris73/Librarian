version: "3.8"

# Standalone compose file for Librarian
# This connects to your existing mediastack services
# Use this while iterating on Librarian: docker-compose -f docker-compose.standalone.yml up -d

services:
  librarian:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: librarian
    ports:
      - 3000:3000
    volumes:
      - /mnt/disk1/appdata/librarian:/config
    environment:
      - PUID=1000
      - PGID=1001
      - TZ=Europe/London
      - LIBRARIAN_ABS_URL=http://audiobookshelf:80
      - LIBRARIAN_ABS_API_TOKEN=${ABS_API_TOKEN}
      - LIBRARIAN_JACKETT_URL=http://jackett:9117
      - LIBRARIAN_JACKETT_API_KEY=${JACKETT_API_KEY}
      - LIBRARIAN_TRANSMISSION_URL=http://transmission:9091
      - LIBRARIAN_TRANSMISSION_USERNAME=admin
      - LIBRARIAN_TRANSMISSION_PASSWORD=admin
      - LIBRARIAN_DOWNLOAD_PATH=/data/audiobooks
    restart: unless-stopped
    network_mode: service:audiobookshelf
    # Or use external network if your mediastack uses a specific network name:
    # networks:
    #   - media

# Uncomment if you need to define the network to join your existing mediastack
# networks:
#   media:
#     external: true
#     name: mediastack_media
